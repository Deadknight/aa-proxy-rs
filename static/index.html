<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>aa-proxy-rs</title>
    <style>
      {PICO_CSS}

      :root {
        --pico-grid-column-gap: 0.5rem;
        --pico-grid-row-gap: 0rem;
      }

      .section-title {
        color: #fff;
        font-weight: bold;
        background-color: #202632;
        width: 100%;
        border-radius: 0.375rem;
        padding: calc(0.25rem * 2);
      }

      .section-body {
        padding: 0.375rem;
      }

      hr {
        border: none;
        background-color: #202632;
        overflow: visible;
        text-align: center;
        height: 0.125rem;
      }

      .grid {
        display: grid;
        align-items: center;
      }

      .grid-cols-1 {
        grid-template-columns: repeat(1, minmax(0, 1fr)) !important;
      }

      .grid-cols-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr)) !important;
      }


      :root {
        --floating-actions-right: 1.25rem;
        --floating-actions-top: 6.25rem;
        --floating-actions-closed-width: 3.6rem;
        --floating-actions-open-width: 17rem;
        --floating-actions-height: 3.6rem;
        --floating-actions-gap: 0.5rem;
        --floating-actions-safe-area: calc(
          var(--floating-actions-right) +
          var(--floating-actions-closed-width) +
          1.25rem
        );
      }

      /* Desktop mode: hide normal ACTIONS blocks, use floating dock */
      .actions-panel {
        display: none;
      }

      .floating-actions {
        position: fixed;
        top: var(--floating-actions-top);
        right: var(--floating-actions-right);
        z-index: 9999;

        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: var(--floating-actions-gap);
      }

      .floating-action {
        width: var(--floating-actions-closed-width);
        height: var(--floating-actions-height);
        min-width: var(--floating-actions-closed-width);
        padding: 0 0.85rem;
        margin: 0;

        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: flex-end;
        gap: 0.75rem;

        overflow: hidden;
        white-space: nowrap;

        border-radius: 0.95rem;
        box-shadow: 0 0.35rem 0.9rem rgba(0, 0, 0, 0.35);

        transition:
          width 160ms ease,
          box-shadow 160ms ease,
          transform 160ms ease;
      }

      .floating-action:hover,
      .floating-action:focus-visible {
        width: var(--floating-actions-open-width);
        transform: translateX(-0.125rem);
        box-shadow: 0 0.5rem 1.15rem rgba(0, 0, 0, 0.45);
      }

      .floating-action-label {
        flex: 1;
        min-width: 0;
        opacity: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        text-align: center;

        transition:
          opacity 120ms ease,
          transform 160ms ease;

        transform: translateX(0.5rem);
      }

      .floating-action:hover .floating-action-label,
      .floating-action:focus-visible .floating-action-label {
        opacity: 1;
        transform: translateX(0);
      }

      .floating-action-icon {
        flex: 0 0 1.5rem;
        width: 1.5rem;
        text-align: center;
        font-size: 1.15rem;
        line-height: 1;
      }

      /*
        Keep equal left/right safe areas. The right side reserves enough room
        for the closed floating icon rail, so icons never sit on top of config text.
      */
      /*main.container {
        padding-left: var(--floating-actions-safe-area);
        padding-right: var(--floating-actions-safe-area);
      }*/

      /*
        Fallback:
        - narrow screens
        - short screens
        - touch devices where hover is not reliable

        In these cases, hide the floating menu and show the old ACTIONS blocks.
      */
      @media (max-width: 900px), (max-height: 560px), (hover: none), (pointer: coarse) {
        .floating-actions {
          display: none;
        }

        .actions-panel {
          display: block;
        }

        main.container {
          padding-left: var(--pico-spacing);
          padding-right: var(--pico-spacing);
        }
      }
    </style>
  </head>
  <body>
    <header style="text-align: center; padding-bottom: 0">
      <h3 style="text-align: center; margin-bottom: 0.125rem">
        🛸 aa-proxy-rs
      </h3>
      <small>build: {BUILD_DATE}, git: {GIT_INFO}</small>
    </header>

    <nav class="floating-actions" aria-label="Quick actions">
      <button
        type="button"
        class="floating-action"
        onclick="saveConfig()"
        title="Save"
        aria-label="Save"
      >
        <span class="floating-action-label">Save</span>
        <span class="floating-action-icon">💾</span>
      </button>

      <button
        type="button"
        class="floating-action download-btn"
        title="Download log package"
        aria-label="Download log package"
      >
        <span class="floating-action-label">Download log package (.tar.gz)</span>
        <span class="floating-action-icon">📜</span>
      </button>

      <button
        type="button"
        class="floating-action"
        onclick="handleAction('/restart')"
        title="Apply / restart"
        aria-label="Apply / restart"
      >
        <span class="floating-action-label">Apply / restart</span>
        <span class="floating-action-icon">🧬</span>
      </button>

      <button
        type="button"
        class="floating-action"
        onclick="handleAction('/reboot')"
        title="Reboot device"
        aria-label="Reboot device"
      >
        <span class="floating-action-label">Reboot device</span>
        <span class="floating-action-icon">🔁</span>
      </button>

      <button
        type="button"
        class="floating-action"
        data-endpoint="/upload-certs"
        title="Upload MITM certs"
        aria-label="Upload MITM certs"
      >
        <span class="floating-action-label">Upload MITM certs (.tar.gz)</span>
        <span class="floating-action-icon">📤</span>
      </button>

      <button
        type="button"
        class="floating-action backup-btn"
        title="Backup configuration"
        aria-label="Backup configuration"
      >
        <span class="floating-action-label">Backup configuration (.tar.gz)</span>
        <span class="floating-action-icon">📦</span>
      </button>

      <button
        type="button"
        class="floating-action"
        onclick="handleAction('/factory-reset', 'Are you sure you want to factory reset?')"
        title="Factory reset"
        aria-label="Factory reset"
      >
        <span class="floating-action-label">Factory reset</span>
        <span class="floating-action-icon">♻️</span>
      </button>

      <button
        type="button"
        class="floating-action"
        data-endpoint="/userdata-restore"
        title="Restore configuration"
        aria-label="Restore configuration"
      >
        <span class="floating-action-label">Restore configuration (.tar.gz)</span>
        <span class="floating-action-icon">📤</span>
      </button>
    </nav>

    <template id="actions-template">
      <fieldset class="actions-panel">
        <legend class="section-title"><strong>🚀 ACTIONS</strong></legend>
        <div class="grid grid-cols-2 section-body">
          <button type="button" onclick="saveConfig()">💾 Save</button>
          <button type="button" class="download-btn">
            📜 Download log package (.tar.gz)
          </button>
          <button type="button" onclick="handleAction('/restart')">
            🧬 Apply / restart
          </button>
          <button type="button" onclick="handleAction('/reboot')">
            🔁 Reboot device
          </button>
          <button type="button" data-endpoint="/upload-certs">
            📤 Upload MITM certs (.tar.gz)
          </button>
          <button type="button" class="backup-btn">
            📦 Backup configuration (.tar.gz)
          </button>
          <button
            type="button"
            onclick="handleAction('/factory-reset', 'Are you sure you want to factory reset?')"
          >
            ♻️ Factory reset
          </button>
          <button type="button" data-endpoint="/userdata-restore">
            📤 Restore configuration (.tar.gz)
          </button>
        </div>
      </fieldset>
    </template>

    <main class="container">
      <form id="config-form">
        <!-- hidden file input for all upload buttons -->
        <input
          type="file"
          id="file-input"
          accept=".tar.gz"
          style="display: none"
        />
        <!-- buttons and CONFIG_VALUES will be inserted via JS -->
      </form>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("config-form");
        const template = document.getElementById("actions-template");

        // Insert top set of buttons
        form.appendChild(template.content.cloneNode(true));

        // Insert CONFIG_VALUES once in the middle
        const configValuesHtml = `{CONFIG_VALUES}`;
        const div = document.createElement("div");
        div.innerHTML = configValuesHtml;
        form.appendChild(div);

        // Insert bottom set of buttons
        form.appendChild(template.content.cloneNode(true));

        // button event listeners
        // download buttons
        document.querySelectorAll(".download-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            triggerDownload("/download", "logs");
          });
        });

        // backup buttons
        document.querySelectorAll(".backup-btn").forEach((btn) => {
          btn.addEventListener("click", () => {
            triggerDownload("/userdata-backup", "backup");
          });
        });

        // single hidden file input in the form
        const fileInput = document.getElementById("file-input");

        // upload buttons event listeners
        document.querySelectorAll("button[data-endpoint]").forEach((button) => {
          button.addEventListener("click", () => {
            const endpoint = button.dataset.endpoint;

            const handler = () => {
              uploadTarGzFile(fileInput, endpoint); // pass the element, not the ID
              fileInput.removeEventListener("change", handler); // detach to avoid double upload
            };

            fileInput.value = "";
            fileInput.addEventListener("change", handler, { once: true });
            fileInput.click();
          });
        });
      });

      // upload function now accepts the actual input element
      async function uploadTarGzFile(fileInputEl, endpoint) {
        const file = fileInputEl.files[0];
        if (!file) return; // user cancelled

        try {
          const res = await fetch(endpoint, {
            method: "POST",
            headers: { "Content-Type": "application/gzip" },
            body: file,
          });

          const text = await res.text();
          if (res.ok) {
            alert(`✅ ${text}`);
          } else {
            alert(`❌ ${text}`);
          }
        } catch (err) {
          alert(`❌ Upload failed: ${err}`);
        } finally {
          fileInputEl.value = ""; // Reset input so the same file can be reselected
        }
      }

      function generateFilename(kind) {
        const now = new Date();
        const timestamp =
          `${now.getFullYear()}` +
          `${String(now.getMonth() + 1).padStart(2, "0")}` +
          `${String(now.getDate()).padStart(2, "0")}` +
          `${String(now.getHours()).padStart(2, "0")}` +
          `${String(now.getMinutes()).padStart(2, "0")}` +
          `${String(now.getSeconds()).padStart(2, "0")}`;
        return `${timestamp}_aa-proxy-rs_${kind}.tar.gz`;
      }

      function triggerDownload(endpoint, kind) {
        const filename = generateFilename(kind);
        const url = `${endpoint}?filename=${encodeURIComponent(filename)}`;
        window.location.href = url;
      }

      function setValue(id, value) {
        const el = document.getElementById(id);
        if (!el) return;

        if (el.type === "checkbox") {
          el.checked = value;
        } else {
          if (
            typeof value === "object" &&
            value !== null &&
            "vid" in value &&
            "pid" in value
          ) {
            el.value = `${value.vid.toString(16).toUpperCase()}:${value.pid.toString(16).toUpperCase()}`;
          } else {
            el.value = value ?? "";
          }
        }
      }

      function getValue(id) {
        const el = document.getElementById(id);
        if (el.type === "checkbox") {
          return el.checked;
        } else if (el.type === "number") {
          return el.value ? parseFloat(el.value) : null;
        } else {
          return el.value;
        }
      }

      async function handleAction(endpoint, confirmMessage = null) {
        try {
          if (confirmMessage && !confirm(confirmMessage)) {
            return; // User canceled
          }

          const response = await fetch(endpoint, { method: "POST" });

          if (!response.ok) {
            throw new Error(`Status: ${response.status}`);
          }

          alert("✅ Request completed successfully!");
        } catch (error) {
          console.error("Request failed:", error);
          alert("❌ Request failed.");
        }
      }

      async function loadConfig() {
        const res = await fetch("/config");
        const data = await res.json();
        for (const key in data) {
          if (document.getElementById(key)) {
            setValue(key, data[key]);
          }
        }
      }

      async function saveConfig() {
        const config = {};
        const ids = [{CONFIG_IDS}];

        ids.forEach((id) => {
          config[id] = getValue(id);
        });

        try {
          const response = await fetch("/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(config),
          });

          if (!response.ok) {
            // Try to get error message from the response
            const errorText = await response.text();
            throw new Error(`Error ${response.status}: ${errorText}`);
          }

          alert("✅ Configuration saved successfully!");
        } catch (error) {
          console.error("❌ Failed to save configuration:", error);
          alert(`❌ Failed to save configuration:\n${error.message}`);
        }
      }

      loadConfig();
    </script>
  </body>
</html>
